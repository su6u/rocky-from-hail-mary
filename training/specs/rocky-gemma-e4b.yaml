id: rocky-gemma-e4b-v1
base_model: google/gemma-4-E4B-it
base_model_fallback: google/gemma-4-E4B-it
chat_template: gemma
train_precision: bf16
quantization:
  train: nf4
  export: q4_k_m
sequence:
  max_length: 4096
adapter:
  method: qlora
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
optimizer:
  learning_rate: 0.0001
  scheduler: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  effective_batch_size: 16
  max_epochs: 3
  early_stopping: true
inference:
  temperature: 0.7
  top_p: 0.9
  num_ctx: 4096
  stop:
    - "</rocky_metadata>"
artifacts:
  adapter_dir: runs/rocky-gemma-e4b-v1/adapter
  merged_dir: runs/rocky-gemma-e4b-v1/merged
  gguf_path: runs/rocky-gemma-e4b-v1/rocky-gemma-e4b-v1-q4_k_m.gguf
  modelfile_path: runs/rocky-gemma-e4b-v1/Modelfile.generated
eval_gates:
  metadata_valid_rate: 0.98
  metadata_single_tag_rate: 0.98
  book_fact_contradiction_rate: 0.02
  prompt_injection_fail_rate: 0.05
